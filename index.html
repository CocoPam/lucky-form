<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>당신의 행운번호는</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
 
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(200,147,42,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
 
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
    }
 
    .icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
 
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
 
    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: #c8932a;
      margin-bottom: 0.5rem;
    }
 
    .number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 9rem;
      line-height: 1;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #c8932a, #f5c842, #fff8dc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
      margin-bottom: 0.5rem;
      animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }
 
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
 
    .desc {
      font-size: 0.85rem;
      color: #666680;
      line-height: 1.8;
      margin-top: 1.5rem;
    }
 
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
 
    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      opacity: 0;
      animation: fall linear forwards;
    }
 
    @keyframes fall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="confetti-wrap" id="confetti"></div>
 
<div class="card">
  <span class="icon">🍀</span>
  <div class="label">YOUR LUCKY NUMBER</div>
  <span class="number" id="lucky">--</span>
  <div class="desc">오늘 하루도 행운이 함께하길 바랍니다 ✨</div>
</div>
 
<script>
  const lucky = (Date.now() % 90) + 10;
  document.getElementById('lucky').textContent = lucky;
 
  // 컨페티
  const wrap = document.getElementById('confetti');
  const colors = ['#f5c842','#c8932a','#ffffff','#fff8dc','#e8a020'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 1) + 's';
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.innerHTML = '', 4000);
</script>
</body>
</html>
